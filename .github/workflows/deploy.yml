name: CI / Deploy Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-checks:
    name: Backend — Install & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Verify FastAPI app imports cleanly
        working-directory: backend/app
        run: |
          python -c "
          import sys, os
          sys.path.insert(0, '.')
          from database import Base, Order, init_db
          from analytics import compute_dashboard_metrics, _fallback_metrics
          metrics = _fallback_metrics()
          assert metrics['gross_revenue'] > 0
          assert 'monthly_labels' in metrics
          print('✅ Backend module check passed')
          "

      - name: Mock code quality check
        run: |
          echo "Running mock lint check on backend..."
          python -m py_compile backend/app/main.py
          python -m py_compile backend/app/database.py
          python -m py_compile backend/app/analytics.py
          echo "✅ All backend files compile without syntax errors"

  frontend-checks:
    name: Frontend — Install & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ""

      - name: Mock code verification
        run: |
          echo "Running mock frontend verification..."
          test -d frontend/dist && echo "✅ Build output exists" || exit 1
          test -f frontend/dist/index.html && echo "✅ index.html found" || exit 1
          echo "✅ Frontend build verification passed"

  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks]

    steps:
      - name: Print deployment summary
        run: |
          echo "================================================"
          echo "  E-commerce Dashboard — Deployment Summary"
          echo "================================================"
          echo "  Branch  : ${{ github.ref_name }}"
          echo "  Commit  : ${{ github.sha }}"
          echo "  Actor   : ${{ github.actor }}"
          echo "  Status  : All checks passed ✅"
          echo "------------------------------------------------"
          echo "  Backend  → FastAPI on port 8000"
          echo "  Frontend → React/Vite on port 5173"
          echo "================================================"
