name: CI and Remote Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend syntax checks
        run: |
          python -m compileall backend/app

      - name: Verify backend imports
        run: |
          python -c "from backend.app.main import app; from backend.app.analytics import compute_dashboard_metrics; print(app.title)"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend assets
        working-directory: frontend
        env:
          VITE_API_URL: ""
        run: npm run build

  auto-deploy:
    name: Auto Deploy
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Deploy application over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            cd "$HOME/LuminousLikelyVerification"
            chmod +x ./deploy.sh
            ./deploy.sh
