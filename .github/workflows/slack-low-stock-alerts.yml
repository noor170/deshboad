name: Slack Low-Stock Alerts

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: slack-low-stock-alerts
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  trigger-alerts:
    name: Trigger Low-Stock Slack Alerts
    runs-on: ubuntu-latest

    steps:
      - name: Validate alert endpoint secrets
        env:
          ALERT_ENDPOINT_URL: ${{ secrets.ALERT_ENDPOINT_URL }}
          SLACK_ALERT_TOKEN: ${{ secrets.SLACK_ALERT_TOKEN }}
        run: |
          test -n "$ALERT_ENDPOINT_URL"
          test -n "$SLACK_ALERT_TOKEN"

      - name: Call low-stock alert endpoint
        env:
          ALERT_ENDPOINT_URL: ${{ secrets.ALERT_ENDPOINT_URL }}
          SLACK_ALERT_TOKEN: ${{ secrets.SLACK_ALERT_TOKEN }}
        run: |
          response_file="$(mktemp)"
          http_code="$(
            curl -sS \
              -o "$response_file" \
              -w "%{http_code}" \
              -X POST "$ALERT_ENDPOINT_URL" \
              -H "X-Alert-Token: $SLACK_ALERT_TOKEN" \
              -H "Accept: application/json"
          )"

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "Alert endpoint request failed with HTTP $http_code"
            cat "$response_file"
            exit 1
          fi

          echo "Alert endpoint response:"
          cat "$response_file"
