name: Daily Low Stock Slack Alert

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

concurrency:
  group: slack-low-stock-alerts
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  trigger-vercel-alert:
    name: Trigger Low-Stock Slack Alert
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Low-Stock Slack Alert
        run: |
          curl -X POST "${{ secrets.ALERT_ENDPOINT_URL }}" \
            -H "X-Alert-Token: ${{ secrets.SLACK_ALERT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"text": "Low stock alert!"}'

#      - name: Test Network Connectivity
      - name: Test Web Handshake and DNS
        run: |
          echo "=== 1. Testing DNS Resolution ==="
          nslookup deshboad-gules.vercel.app || echo "DNS Lookup Failed"

          echo "=== 2. Testing HTTPS Connection to Vercel (5s timeout) ==="
          curl -v -I --connect-timeout 5 https://deshboad-gules.vercel.app/ || echo "Vercel Connection Failed"

          echo "=== 3. Testing HTTPS Connection to Slack ==="
          curl -v -I --connect-timeout 5 https://hooks.slack.com || echo "Slack Connection Failed"

