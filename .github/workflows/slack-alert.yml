name: Daily Low Stock Slack Alert

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

concurrency:
  group: slack-low-stock-alerts
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  trigger-vercel-alert:
    name: Trigger Low-Stock Slack Alert
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Low-Stock Slack Alert
        run: |
          curl -X POST "${{ secrets.ALERT_ENDPOINT_URL }}" \
            -H "X-Alert-Token: ${{ secrets.SLACK_ALERT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"text": "Low stock alert!"}'

      - name: Test Network Connectivity
        run: |
          ping -c 3 google.com
          curl -I https://deshboad-gules.vercel.app/
          
          
          # Replace with actual domain to test handshake

