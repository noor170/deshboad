name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile backend source
        run: python -m compileall backend/app

      - name: Smoke test backend imports
        env:
          DB_DIALECT: sqlite
          SQLITE_DB_PATH: ./backend/ci-smoke.db
        run: |
          python -c "from backend.app.main import app; from backend.app.analytics import compute_dashboard_metrics; print(app.title)"

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ""
        run: npm run build

  docker-ci:
    name: Docker CI
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Build application images
        run: docker compose build backend frontend

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      - backend-ci
      - frontend-ci
      - docker-ci
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    steps:
      - name: Validate deploy secrets
        env:
          HOST: ${{ secrets.HOST }}
          USER: ${{ secrets.USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          test -n "$HOST"
          test -n "$USER"
          test -n "$SSH_PRIVATE_KEY"

      - name: Deploy application over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            cd "$HOME/LuminousLikelyVerification"
            chmod +x ./deploy.sh
            ./deploy.sh
